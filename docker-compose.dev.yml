services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: nunujal-backend-dev
    restart: unless-stopped
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8028 --reload
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:5073
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
    ports:
      - "8028:8028"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: nunujal-frontend-dev
    restart: unless-stopped
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --strictPort
    environment:
      VITE_API_BASE_URL: http://localhost:8028
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5073:5073"
    depends_on:
      - backend

volumes:
  frontend-node-modules:
